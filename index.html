<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Instituto Müller — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#1a5c3a;--vm:#1d6b44;--vl:#e8f4ed;--vxl:#c8e6d4;--vb:#0f3d26;
  --g50:#F1EFE8;--g100:#D3D1C7;--g200:#B4B2A9;--g400:#888780;--g600:#5F5E5A;--g800:#444441;--g900:#2C2C2A;
  --b50:#E6F1FB;--b400:#378ADD;--b600:#185FA5;
  --a50:#FAEEDA;--a400:#BA7517;--a600:#854F0B;
  --c50:#FAECE7;--c400:#D85A30;--c600:#993C1D;
  --r50:#FCEBEB;--r400:#E24B4A;
  --p50:#EEEDFE;--p400:#7F77DD;--p600:#534AB7;
}
body{font-family:'Inter',sans-serif;font-size:14px;background:#f0f4f1;color:var(--g900);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;background:linear-gradient(135deg,var(--vb) 0%,var(--v) 100%);padding:20px}
.login-logo h1{font-size:26px;font-weight:600;color:#fff;text-align:center}
.login-logo p{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;letter-spacing:.5px;text-transform:uppercase;text-align:center}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:24px 28px;width:170px;cursor:pointer;transition:all .2s;text-align:center;color:#fff}
.login-card:hover,.login-card:active{background:rgba(255,255,255,.2);transform:translateY(-3px)}
.login-card .ci{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;background:rgba(255,255,255,.15)}
.login-card h3{font-size:14px;font-weight:600}
.login-card p{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}

/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--v);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:14px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.topbar-logo i{font-size:18px;color:rgba(255,255,255,.7)}
.role-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;background:rgba(255,255,255,.2);color:#fff}
.btn-logout{font-size:12px;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:8px}
.btn-logout:hover{color:#fff}
.main{display:flex;min-height:calc(100vh - 52px)}

/* SIDEBAR - desktop */
.sidebar{width:200px;min-width:200px;background:#fff;border-right:.5px solid var(--g100);padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:8px;font-size:13px;color:var(--g600);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .1s;min-height:44px}
.nav-item:hover{background:var(--g50);color:var(--g900)}
.nav-item.active{background:var(--vl);color:var(--v);font-weight:500}
.nav-item i{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--c400);color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}

/* CONTENT */
.content{flex:1;padding:16px;overflow-y:auto;min-width:0}
.ph{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph h2{font-size:17px;font-weight:600}
.ph p{font-size:12px;color:var(--g400);margin-top:2px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.sc{background:#fff;border:.5px solid var(--g100);border-radius:10px;padding:12px 14px}
.sc .lb{font-size:10px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sc .vl{font-size:22px;font-weight:600;color:var(--g900);margin-top:4px}

/* KANBAN */
.kw{overflow-x:auto;padding-bottom:12px;cursor:grab;user-select:none}
.kw.dragging-scroll{cursor:grabbing}
.kw::-webkit-scrollbar{height:6px}
.kw::-webkit-scrollbar-track{background:var(--g50);border-radius:3px}
.kw::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
.kb{display:flex;gap:10px;min-width:max-content;padding:2px}
.kc{width:220px;background:#fff;border:.5px solid var(--g100);border-radius:12px;overflow:hidden;flex-shrink:0}
.kch{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--g100)}
.kct{font-size:12px;font-weight:600;color:var(--g800);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kcc{font-size:10px;font-weight:600;background:var(--g50);color:var(--g400);padding:2px 7px;border-radius:10px}
.btn-ec{background:none;border:none;cursor:pointer;color:var(--g400);font-size:14px;padding:3px 5px;border-radius:4px;min-height:32px;min-width:32px;display:flex;align-items:center;justify-content:center}
.btn-ec:hover{color:var(--v);background:var(--vl)}
.kcards{padding:8px;min-height:80px;display:flex;flex-direction:column;gap:6px}
.kcards.drag-over{background:var(--vl);border-radius:8px;outline:2px dashed var(--v)}
.kcard{background:#fff;border:.5px solid var(--g100);border-radius:10px;padding:11px;cursor:pointer;transition:border-color .15s;position:relative}
.kcard:hover{border-color:var(--vxl)}
.kcard.dragging{opacity:.4;transform:scale(.97)}
.kcard .kn{font-size:13px;font-weight:500;color:var(--g900)}
.kcard .ks{font-size:11px;color:var(--g400);margin-top:2px}
.kcard .ka{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.kadd-col{width:160px;flex-shrink:0;border:1.5px dashed var(--g100);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--g400);font-size:13px;min-height:100px;transition:all .15s}
.kadd-col:hover{border-color:var(--v);color:var(--v);background:var(--vl)}

/* CHECKLIST badge */
.ck-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px}
.ck-ok{background:#eafaf3;color:var(--v)}
.ck-pend{background:var(--a50);color:var(--a600)}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.bv{background:var(--vl);color:var(--v)}
.bb{background:var(--b50);color:var(--b600)}
.ba{background:var(--a50);color:var(--a600)}
.bc{background:var(--c50);color:var(--c600)}
.br{background:var(--r50);color:var(--r400)}
.bg{background:var(--g50);color:var(--g600)}

/* BTN */
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap;min-height:40px}
.btn:hover{opacity:.85}
.btn:active{opacity:.7;transform:scale(.98)}
.btn-v{background:var(--v);color:#fff}
.btn-b{background:var(--b400);color:#fff}
.btn-a{background:var(--a400);color:#fff}
.btn-p{background:var(--p400);color:#fff}
.btn-r{background:var(--r400);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;min-height:36px}
.btn-xs{padding:4px 8px;font-size:11px;min-height:30px}
.btn-ghost{background:var(--g50);color:var(--g800);border:.5px solid var(--g100)}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:20px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;min-height:36px}
.btn-cancel{padding:8px 14px;border-radius:8px;font-size:13px;border:.5px solid var(--g100);background:none;cursor:pointer;color:var(--g600);min-height:40px}
.btn-danger{background:var(--r50);color:var(--r400);border:.5px solid #f7c1c1}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(15,61,38,.5);z-index:200;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.modal-lg{max-width:700px}
.modal-sm{max-width:380px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mh h3{font-size:16px;font-weight:600}
.mc{background:none;border:none;cursor:pointer;font-size:22px;color:var(--g400);padding:4px;min-height:40px;min-width:40px;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;border:.5px solid var(--g100);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--g900);background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none;min-height:44px}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fg textarea{min-height:80px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{margin-top:18px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.ms{margin-top:14px;padding-top:14px;border-top:.5px solid var(--g100)}
.ms-title{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}

/* CHECKLIST no modal */
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--g50);border-radius:8px;margin-bottom:6px}
.ck-item input[type=checkbox]{width:20px;height:20px;flex-shrink:0;margin-top:2px;cursor:pointer;accent-color:var(--v)}
.ck-item label{font-size:13px;color:var(--g800);flex:1;cursor:pointer;line-height:1.4}
.ck-item.done label{text-decoration:line-through;color:var(--g400)}
.ck-field{margin-top:6px}
.ck-field input{width:100%;border:.5px solid var(--g100);border-radius:6px;padding:7px 10px;font-size:12px;font-family:Inter,sans-serif;background:#fff;outline:none}
.ck-field input:focus{border-color:var(--v)}

/* CONTATOS */
.cont-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:.5px solid var(--g50);cursor:pointer;transition:background .1s;min-height:56px}
.cont-item:hover,.cont-item:active{background:var(--vl)}
.cont-item.sel{background:var(--vl);border-left:3px solid var(--v)}
.av{width:40px;height:40px;border-radius:50%;background:var(--vl);color:var(--v);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.ci-info .cn{font-size:13px;font-weight:500;color:var(--g900)}
.ci-info .cw{font-size:11px;color:var(--g400)}
.cont-list{max-height:260px;overflow-y:auto;border:.5px solid var(--g100);border-radius:8px}

/* TABLE */
.tc{background:#fff;border:.5px solid var(--g100);border-radius:12px;overflow:hidden}
.tt{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--g100);flex-wrap:wrap}
.tt input,.tt select{border:.5px solid var(--g100);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:var(--g50);color:var(--g900);min-height:40px}
.tt input{flex:1;min-width:150px}
.tt input:focus{border-color:var(--v)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--g50);font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;text-align:left}
tbody td{padding:12px 14px;font-size:13px;border-top:.5px solid var(--g50);color:var(--g800);vertical-align:middle}
tbody tr:hover{background:var(--g50)}

/* PROTOCOLO */
.pb{background:var(--g100);border-radius:4px;height:5px;overflow:hidden;display:block;width:100%}
.pf{height:100%;border-radius:4px;background:var(--v)}

/* VISAO DIAS */
.dias-card{background:#fff;border:.5px solid var(--g100);border-radius:10px;overflow:hidden;flex-shrink:0;width:190px;cursor:default;transition:border-color .15s}
.dias-card.tem-pac{border-color:var(--vxl)}
.dias-card.drag-over-dia{border-color:var(--v);background:var(--vl);outline:2px dashed var(--v)}
.dias-card-header{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--g100)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--v);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:all .25s;max-width:90vw;text-align:center;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{text-align:center;padding:40px;color:var(--g400);font-size:13px}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 24px;color:var(--g400)}
.empty i{font-size:32px;display:block;margin-bottom:8px}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none}
  .content{padding:12px}
  .fr{grid-template-columns:1fr}
  .modal{border-radius:20px 20px 0 0;padding:20px}
  .ph{flex-direction:column;gap:8px}
  .ph .btn{align-self:flex-start}
  .stats-row{grid-template-columns:1fr 1fr}
  .kc{width:200px}
  table{display:block;overflow-x:auto}
  .tt{flex-direction:column;align-items:stretch}
  .tt input,.tt select{width:100%}

  /* Bottom nav mobile */
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.5px solid var(--g100);z-index:99;padding:6px 0 max(6px,env(safe-area-inset-bottom)) 0}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--g400);font-size:10px;font-weight:500;position:relative}
  .mobile-nav-item.active{color:var(--v)}
  .mobile-nav-item i{font-size:22px}
  .mobile-nav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--c400);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}
  .main{flex-direction:column;padding-bottom:60px}
}
@media(min-width:769px){
  .mobile-nav{display:none}
  .mo{align-items:center}
  .modal{border-radius:16px;max-height:90vh}
}

/* Fluxo editor */
.fe-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--g50);border-radius:8px;margin-bottom:6px}
.fe-item input{flex:1;border:.5px solid var(--g100);border-radius:6px;padding:6px 8px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;min-height:38px}

/* Histórico etapas */
.hist-item{padding:10px 12px;background:var(--g50);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--g200)}
.hist-item.done{border-left-color:var(--v)}
.hist-item .hi-etapa{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.3px}
.hist-item .hi-data{font-size:10px;color:var(--g400)}
.hist-campo{font-size:12px;color:var(--g800);margin-top:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">
    <h1>Instituto Müller</h1>
    <p>Sistema de atendimento interno</p>
  </div>
  <div class="login-cards">
    <div class="login-card" onclick="login('atendente')">
      <div class="ci"><i class="ti ti-headset"></i></div>
      <h3>Atendente</h3><p>Qualificação e agendamentos</p>
    </div>
    <div class="login-card" onclick="login('vendas')">
      <div class="ci"><i class="ti ti-target"></i></div>
      <h3>Vendas</h3><p>Fechamento de propostas</p>
    </div>
    <div class="login-card" onclick="login('concierge')">
      <div class="ci"><i class="ti ti-clipboard-heart"></i></div>
      <h3>Concierge</h3><p>Acompanhamento do protocolo</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <i class="ti ti-leaf" aria-hidden="true"></i>
      Instituto Müller
      <span class="role-tag" id="role-badge"></span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="ti ti-logout"></i></button>
  </div>
  <div class="main">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content" id="content"></div>
  </div>
  <nav class="mobile-nav" id="mobile-nav"></nav>
</div>

<!-- MODAL LEAD -->
<div class="mo" id="m-lead">
  <div class="modal">
    <div class="mh"><h3 id="ml-title">Novo lead</h3><button class="mc" onclick="closeM('m-lead')"><i class="ti ti-x"></i></button></div>
    <div class="fg"><label>Buscar contato</label>
      <input type="text" id="ml-busca" placeholder="Nome ou número..." oninput="filtrarContatosM(this.value)" autocomplete="off">
    </div>
    <div class="cont-list" id="ml-cont-list" style="margin-bottom:12px"></div>
    <div style="text-align:center;font-size:12px;color:var(--g400);margin-bottom:10px">— ou preencha manualmente —</div>
    <div class="fr">
      <div class="fg"><label>Nome</label><input id="ml-nome" placeholder="Nome completo" autocomplete="off"></div>
      <div class="fg"><label>WhatsApp</label><input id="ml-wa" placeholder="51 9 9999-9999" type="tel"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Origem</label>
        <select id="ml-origem"><option>Instagram</option><option>Indicação</option><option>Google</option><option>WhatsApp direto</option><option>Outro</option></select>
      </div>
      <div class="fg"><label>Objetivo</label><input id="ml-obj" placeholder="Emagrecimento..." autocomplete="off"></div>
    </div>
    <div class="fg"><label>Etapa</label><select id="ml-etapa"></select></div>
    <div class="mf">
      <button class="btn-cancel" onclick="closeM('m-lead')">Cancelar</button>
      <button class="btn btn-v" onclick="salvarLead()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VER LEAD (com checklist) -->
<div class="mo" id="m-ver">
  <div class="modal modal-lg">
    <div class="mh"><h3 id="mv-title">Detalhes</h3><button class="mc" onclick="closeM('m-ver')"><i class="ti ti-x"></i></button></div>
    <div id="mv-body"></div>
    <div class="mf" id="mv-footer"><button class="btn-cancel" onclick="closeM('m-ver')">Fechar</button></div>
  </div>
</div>

<!-- MODAL EDITAR COL -->
<div class="mo" id="m-col">
  <div class="modal modal-sm">
    <div class="mh"><h3>Editar etapa</h3><button class="mc" onclick="closeM('m-col')"><i class="ti ti-x"></i></button></div>
    <div class="fg"><label>Nome</label><input id="col-nome" autocomplete="off"></div>
    <div class="fg"><label>Cor</label>
      <select id="col-cor">
        <option value="#1D9E75">Verde</option><option value="#378ADD">Azul</option>
        <option value="#BA7517">Âmbar</option><option value="#D85A30">Coral</option>
        <option value="#E24B4A">Vermelho</option><option value="#7F77DD">Roxo</option>
        <option value="#888780">Cinza</option>
      </select>
    </div>
    <div class="fg"><label style="margin-bottom:8px">Checklist desta etapa</label>
      <div id="col-ck-list"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;width:100%" onclick="addCkItem()"><i class="ti ti-plus"></i> Adicionar item</button>
    </div>
    <div class="mf">
      <button class="btn btn-danger btn-sm" onclick="deletarCol()"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeM('m-col')">Cancelar</button>
      <button class="btn btn-v" onclick="salvarCol()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PROTOCOLO -->
<div class="mo" id="m-pac">
  <div class="modal modal-lg">
    <div class="mh"><h3 id="mpac-title">Protocolo</h3><button class="mc" onclick="closeM('m-pac')"><i class="ti ti-x"></i></button></div>
    <div id="mpac-body"></div>

// ── UTILS NÚMERO WA ──
function limparNumero(n){
  if(!n) return '';
  let s = String(n);
  // Remove sufixos @lid @c.us etc
  s = s.replace(/@.*$/, '');
  // Remove tudo que não é dígito
  let d = s.replace(/\D/g,'');
  if(!d || d.length < 8) return '';
  // Números com mais de 13 dígitos são IDs internos do WA (LID)
  // Tenta extrair os últimos 13 dígitos que podem ser o número real
  if(d.length > 13) {
    // Pega os últimos 11 ou 13 dígitos
    const tail13 = d.slice(-13);
    const tail11 = d.slice(-11);
    if(tail13.startsWith('55')) return tail13;
    if(tail11.length === 11) return '55' + tail11;
    return ''; // Não conseguiu extrair número válido
  }
  // Garante DDI 55 (Brasil)
  if(d.length === 11 && !d.startsWith('55')) d = '55' + d;
  if(d.length === 10 && !d.startsWith('55')) d = '55' + d;
  return d;
}

// Mostra número formatado para exibição
function exibirNumero(n){
  if(!n) return '—';
  const s = String(n).replace(/@.*$/, '');
  const d = s.replace(/\D/g,'');
  // Se for LID (número muito longo > 13 dígitos), não tenta formatar
  if(d.length > 13) return '—';
  // Normaliza com DDI 55
  let num = d;
  if(num.length === 11 && !num.startsWith('55')) num = '55' + num;
  if(num.length === 10 && !num.startsWith('55')) num = '55' + num;
  if(!num.startsWith('55')) return num;
  // Formata: +55 (DD) 9 1234-5678
  if(num.length === 13) return `+${num.slice(0,2)} (${num.slice(2,4)}) ${num.slice(4,5)} ${num.slice(5,9)}-${num.slice(9)}`;
  if(num.length === 12) return `+${num.slice(0,2)} (${num.slice(2,4)}) ${num.slice(4,8)}-${num.slice(8)}`;
  return num;
}
function openWA(n){
  const num = limparNumero(n);
  if(!num){toast('⚠️ Número inválido');return;}
  window.open('https://wa.me/'+num,'_blank');
}

let PROTO = { 120: [], 1010: [], 1515: [] };
let _protoCarregado = false;

async function carregarProtosPlanilha(){
  if(_protoCarregado) return;
  try {
    // Carrega Página6 (protocolo 120d)
    const [r120, r1010, r1515] = await Promise.all([
      fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=P%C3%A1gina6'),
      fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=Linha+do+Tempo+10%2F10'),
      fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=Linha+do+Tempo+15%2F15')
    ]);
    const [csv120, csv1010, csv1515] = await Promise.all([r120.text(), r1010.text(), r1515.text()]);
    
    const parsearProto = (csv) => {
      const linhas = csv.split('\n').slice(1).filter(l=>l.trim());
      return linhas.map(l => {
        const cols = l.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||[];
        const limpar = s => (s||'').replace(/^"|"$/g,'').trim();
        const celA = limpar(cols[0]);
        const numD = celA.match(/D(\d+)/);
        if(!numD) return null;
        const tarefa = celA.replace(/^D\d+\s*/,'').replace(/\n/g,' ').trim();
        return [parseInt(numD[1]), tarefa];
      }).filter(Boolean);
    };
    
    PROTO[120] = parsearProto(csv120);
    PROTO[1010] = parsearProto(csv1010);
    PROTO[1515] = parsearProto(csv1515);
    _protoCarregado = true;
    if(paginaAtual==='dias') renderDias();
  } catch(e) { console.error('Erro carregando protocolos:', e); }
}

function tarefaDoDia(protocolo,dia){
  const lista=PROTO[protocolo]||PROTO[120];
  let ultima=lista[0];
  for(const[d,t]of lista){if(d<=dia)ultima=[d,t];else break;}
  const prox=lista.find(([d])=>d>dia);
  return{atual:ultima[1],proxDia:prox?prox[0]:null};
}
function diaAtualCalc(p){
  if(!p.inicio)return p.diaAtual||1;
  const ini=new Date(p.inicio);
  const hoje=new Date();
  const diff=Math.floor((hoje-ini)/(1000*60*60*24));
  return Math.max(1,Math.min(diff+1,p.protocolo||120));
}

function initKanbanScroll(aba){
  const el=document.getElementById('kw-'+aba);if(!el)return;
  let isDown=false,startX,scrollLeft;
  el.addEventListener('mousedown',e=>{
    if(e.target.closest('.kcard,.btn,.btn-ec,.kadd-col'))return;
    isDown=true;el.classList.add('dragging-scroll');
    startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;
  });
  el.addEventListener('mouseleave',()=>{isDown=false;el.classList.remove('dragging-scroll')});
  el.addEventListener('mouseup',()=>{isDown=false;el.classList.remove('dragging-scroll')});
  el.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-el.offsetLeft;const walk=(x-startX)*1.5;el.scrollLeft=scrollLeft-walk});
}

// ── SELEÇÃO MÚLTIPLA ──
function toggleSelecao(aba) {
  _modoSelecao = !_modoSelecao;
  _selecao.clear();
  const barra = document.getElementById('barra-selecao-'+aba);
  const btn = document.getElementById('btn-selecao-'+aba);
  if (barra) barra.style.display = _modoSelecao ? 'flex' : 'none';
  if (btn) btn.style.background = _modoSelecao ? 'var(--v)' : '';
  if (btn) btn.style.color = _modoSelecao ? '#fff' : '';
  renderKanban(aba);
}

function toggleCard(id, aba) {
  if (_selecao.has(id)) _selecao.delete(id);
  else _selecao.add(id);
  const count = document.getElementById('count-selecao-'+aba);
  if (count) count.textContent = `${_selecao.size} selecionado${_selecao.size!==1?'s':''}`;
  renderKanban(aba);
}

function selecionarTodosVisiveis(aba) {
  const dados = aba==='atendente' ? leadsCache : vendasCache;
  const busca = (document.getElementById('busca-kanban-'+aba)||{}).value||'';
  const filtrados = busca ? dados.filter(d=>(d.nome||'').toLowerCase().includes(busca.toLowerCase())||(d.wa||'').includes(busca)) : dados;
  filtrados.forEach(d => _selecao.add(d.id));
  const count = document.getElementById('count-selecao-'+aba);
  if (count) count.textContent = `${_selecao.size} selecionado${_selecao.size!==1?'s':''}`;
  renderKanban(aba);
}

function cancelarSelecao(aba) {
  _modoSelecao = false;
  _selecao.clear();
  const barra = document.getElementById('barra-selecao-'+aba);
  const btn = document.getElementById('btn-selecao-'+aba);
  if (barra) barra.style.display = 'none';
  if (btn) { btn.style.background=''; btn.style.color=''; }
  renderKanban(aba);
}

async function excluirSelecionados(aba) {
  if (!_selecao.size) return;
  if (!confirm(`Excluir ${_selecao.size} lead(s)? Esta ação não pode ser desfeita.`)) return;
  const col = aba==='atendente' ? 'leads' : 'vendas';
  const ids = [..._selecao];
  for (const id of ids) {
    await db.collection(col).doc(id).delete();
  }
  toast(`✅ ${ids.length} lead(s) excluído(s)`);
  cancelarSelecao(aba);
}

async function moverSelecionados(aba) {
  if (!_selecao.size) return;
  const cols = aba==='atendente' ? colsAt : colsV;
  const lista = cols.map(function(c,i){ return (i+1)+'. '+c.nome; }).join('\n');
  const etapa = prompt('Mover para qual etapa?\n\n' + lista + '\n\nDigite o numero:');
  if (!etapa) return;
  const idx = parseInt(etapa) - 1;
  if (isNaN(idx) || !cols[idx]) { toast('Etapa invalida'); return; }
  const col = aba==='atendente' ? 'leads' : 'vendas';
  const ids = [..._selecao];
  for (const id of ids) {
    await db.collection(col).doc(id).update({ etapa: cols[idx].nome });
  }
  toast('Movido: ' + ids.length + ' lead(s) para ' + cols[idx].nome);
  cancelarSelecao(aba);
}

// ── DRAG & DROP KANBAN ──
let _dragId=null,_dragAba=null;
let _selecao=new Set();
let _modoSelecao=false;
let _buscaKanban='';
function dragStart(e,id,aba){_dragId=id;_dragAba=aba;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.kcards').forEach(el=>el.classList.remove('drag-over'))}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over')}
function dragLeave(e){e.currentTarget.classList.remove('drag-over')}
async function dropCard(e,novaEtapa,aba){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!_dragId||_dragAba!==aba)return;
  const col=aba==='atendente'?'leads':'vendas';
  const etapaAnterior = (aba==='atendente'?leadsCache:vendasCache).find(x=>x.id===_dragId)?.etapa||'';
  await fbUp(col,_dragId,{etapa:novaEtapa});
  if(etapaAnterior!==novaEtapa) toast(`→ ${novaEtapa}`);
  _dragId=null;_dragAba=null;
}

// Touch drag kanban
let _tc=null,_tclone=null,_tid=null,_taba=null;
function initTouchKanban(){
  document.addEventListener('touchstart',e=>{
    const card=e.target.closest('.kcard');
    if(!card||!card.dataset.id)return;
    _tc=card;_tid=card.dataset.id;_taba=card.dataset.aba;
    _tclone=card.cloneNode(true);
    _tclone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;z-index:9999;width:${card.offsetWidth}px;transform:scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,.2)`;
    document.body.appendChild(_tclone);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!_tclone)return;
    const t=e.touches[0];
    _tclone.style.left=(t.clientX-80)+'px';_tclone.style.top=(t.clientY-30)+'px';
    document.querySelectorAll('.kcards').forEach(el=>el.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const kards=el?.closest('.kcards');
    if(kards)kards.classList.add('drag-over');
  },{passive:true});
  document.addEventListener('touchend',async e=>{
    if(!_tclone){return;}
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const kards=el?.closest('.kcards');
    document.querySelectorAll('.kcards').forEach(el=>el.classList.remove('drag-over'));
    if(kards&&_tid&&_taba){
      const novaEtapa=kards.dataset.etapa;
      const col=_taba==='atendente'?'leads':'vendas';
      if(novaEtapa)await fbUp(col,_tid,{etapa:novaEtapa});
    }
    _tclone.remove();_tclone=null;_tc=null;_tid=null;_taba=null;
  });
}

// ── COLS FIREBASE ──
async function fbGetCols(aba){
  const snap=await db.collection('cfg_cols_'+aba).get();
  if(snap.empty)return null;
  return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
}
async function fbSaveCols(aba,cols){
  const ref=db.collection('cfg_cols_'+aba);
  const snap=await ref.get();
  for(const d of snap.docs)await d.ref.delete();
  for(let i=0;i<cols.length;i++)await ref.add({nome:cols[i].nome,cor:cols[i].cor,ordem:i,ck:cols[i].ck||[]});
}

let _fichaLeadId=null, _fichaLeadAba=null;

async function moverCampoFicha(idx, dir){
  const id=_fichaLeadId, aba=_fichaLeadAba;
  const dados=aba==='atendente'?leadsCache:vendasCache;
  const lead=dados.find(x=>x.id===id);if(!lead)return;
  const fichaLivre=JSON.parse(JSON.stringify(lead.fichaLivre||[]));
  const novoIdx=idx+dir;
  if(novoIdx<0||novoIdx>=fichaLivre.length)return;
  [fichaLivre[idx],fichaLivre[novoIdx]]=[fichaLivre[novoIdx],fichaLivre[idx]];
  const col=aba==='atendente'?'leads':'vendas';
  await fbUp(col,id,{fichaLivre});
  const wrap=document.getElementById('ficha-livre-wrap');
  if(wrap) wrap.innerHTML=renderFichaLivre(fichaLivre);
}

async function deletarCampoFicha(idx){
  if(!confirm('Remover este campo da ficha?')) return;
  const id=_fichaLeadId, aba=_fichaLeadAba;
  const dados=aba==='atendente'?leadsCache:vendasCache;
  const lead=dados.find(x=>x.id===id);if(!lead)return;

async function toggleCk(id,aba,ckId,ok){
  const col=aba==='atendente'?'leads':'vendas';
  const dados=aba==='atendente'?leadsCache:vendasCache;
  const lead=dados.find(x=>x.id===id);if(!lead)return;
  const checklist=JSON.parse(JSON.stringify(lead.checklist||{}));
  if(!checklist[ckId])checklist[ckId]={ok:false,valor:''};
  checklist[ckId].ok=ok;
  const wrap=document.getElementById('ckwrap-'+ckId);
  if(wrap)wrap.classList.toggle('done',ok);

  // Se desmarcar e não tiver valor, remove da fichaLivre
  const fichaLivre=JSON.parse(JSON.stringify(lead.fichaLivre||[]));
  if(!ok){
    const idx=fichaLivre.findIndex(f=>f._ckId===ckId);
    if(idx>=0 && !checklist[ckId]?.valor?.trim()) fichaLivre.splice(idx,1);
  }

  await fbUp(col,id,{checklist,fichaLivre});
  const fichaWrap=document.getElementById('ficha-livre-wrap');
  if(fichaWrap) fichaWrap.innerHTML=renderFichaLivre(fichaLivre);
}
async function salvarCkCampo(id,aba,ckId,valor,label){
  const col=aba==='atendente'?'leads':'vendas';
  const dados=aba==='atendente'?leadsCache:vendasCache;
  const lead=dados.find(x=>x.id===id);if(!lead)return;
  const checklist=JSON.parse(JSON.stringify(lead.checklist||{}));
  if(!checklist[ckId])checklist[ckId]={ok:false,valor:''};
  checklist[ckId].valor=valor;
  if(valor.trim())checklist[ckId].ok=true;

  // Sincroniza com fichaLivre automaticamente
  const fichaLivre=JSON.parse(JSON.stringify(lead.fichaLivre||[]));
  const idxFicha=fichaLivre.findIndex(f=>f._ckId===ckId);
  if(valor.trim()){
    if(idxFicha>=0){
      fichaLivre[idxFicha].valor=valor.trim();
    } else {
      fichaLivre.push({label:label||ckId, valor:valor.trim(), _ckId:ckId});
    }
  } else if(idxFicha>=0){
    fichaLivre.splice(idxFicha,1);
  }

  await fbUp(col,id,{checklist,fichaLivre});

  // Atualiza checkbox visualmente
  const cb=document.getElementById('ck-'+ckId);
  const wrap=document.getElementById('ckwrap-'+ckId);
  if(cb&&valor.trim()){cb.checked=true;if(wrap)wrap.classList.add('done')}

  // Atualiza ficha na tela
  const fichaWrap=document.getElementById('ficha-livre-wrap');
  if(fichaWrap) fichaWrap.innerHTML=renderFichaLivre(fichaLivre);
}

  // Salva snapshot da etapa anterior no histórico
  if(colAnterior){

      if(lead.checklist?.[item.id]){
        ckSnap[item.id]=lead.checklist[item.id];
      }
    });
    hist[lead.etapa]={data:new Date().toLocaleDateString('pt-BR'),campos:{},ckSnap};
  }
  // checklist NÃO é zerado - mantém todos os dados
  await fbUp(col,id,{etapa,historico:hist});
  toast(`✅ Movido para ${etapa}`);

async function associarPaciente(nomePlanilha){
  // abre modal de busca nos contatos WA
  const q = prompt('Digite parte do nome ou número do contato do WhatsApp para associar a "' + nomePlanilha + '":');
  if(!q) return;
  const matches = contatosCache.filter(c =>
    (c.nome||'').toLowerCase().includes(q.toLowerCase()) || (c.wa||'').includes(q)
  );
  if(!matches.length){ toast('Nenhum contato encontrado'); return; }
  let escolha;
  if(matches.length === 1){
    escolha = matches[0];
  } else {
    const idx = parseInt(prompt('Encontrados:\n' + matches.map((m,i) => (i+1)+'. '+m.nome+' ('+exibirNumero(m.wa)+')').join('\n') + '\nDigite o número:')) - 1;
    if(isNaN(idx) || !matches[idx]){ toast('Cancelado'); return; }
    escolha = matches[idx];
  }
  // Salva associação no Firebase
  await db.collection('_planilha_assoc').doc(nomePlanilha).set({ wa: escolha.wa, nome: escolha.nome });
  _assocCache[nomePlanilha] = escolha.wa;
  toast('✅ Associado: ' + nomePlanilha + ' → ' + escolha.nome);
  renderHoje();
}

async function carregarHoje(forcar){
  const wrap = document.getElementById('hoje-wrap');
  if(!wrap) return;

  // Usa cache se disponível e não forçar
  if(_planilhaCache && !forcar){ renderHoje(); return; }

  wrap.innerHTML = '<div class="loading"><i class="ti ti-loader spin"></i> Carregando...</div>';
  try {
    const [res] = await Promise.all([
      fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=HOJE'),
      carregarAssociacoes()
    ]);
    const csv = await res.text();
    const linhas = csv.split('\n').slice(1).filter(l => l.trim() && !l.startsWith('"Paciente"'));
    const limpar = s => (s||'').replace(/^"|"$/g,'').trim();
    _planilhaCache = linhas.map(l => {
      const cols = l.match(/(".*?"|[^,]+)/g)||[];
      return { paciente: limpar(cols[0]), d: limpar(cols[2]), enviado: limpar(cols[3]), origem: limpar(cols[4]) };
    }).filter(t => t.paciente && t.paciente !== 'Paciente');
    renderHoje();
  } catch(e) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--r400)">Erro: ' + e.message + '</div>';
  }
}

          <i class="ti ti-check" style="color:var(--v);font-size:14px;flex-shrink:0;margin-top:1px"></i>
          <div style="font-size:13px;color:var(--g800)">${v.valor}</div>
        </div>`).join('')}
    </div>`:''}`;
  openM('m-pac');
}
async function salvarProtocolo(){
  if(!pacAtivo)return;
  const novoDia=parseInt(document.getElementById('pac-dia').value)||1;
  const novoProt=parseInt(document.getElementById('pac-prot').value)||120;
  const novaData=document.getElementById('pac-inicio').value;
  // Calcula novo inicio baseado no dia informado
  const novoInicio = novaData || calcInicioParaDia(novoDia);
  await fbUp('pacientes',pacAtivo.id,{
    diaAtual:novoDia,
    protocolo:novoProt,
    nota:document.getElementById('pac-nota').value,
    inicio:novoInicio
  });
  closeM('m-pac');toast('✅ Protocolo atualizado');
}

function atualizarPreviewInicio(dia){
  const d = parseInt(dia)||1;
  const novoInicio = calcInicioParaDia(d);
  const el = document.getElementById('pac-inicio');
  const prev = document.getElementById('pac-inicio-preview');
  if(el) el.value = novoInicio;
  if(prev) prev.textContent = 'Início ajustado para: ' + new Date(novoInicio+'T12:00:00').toLocaleDateString('pt-BR');
}

function atualizarPreviewDia(data){
  if(!data) return;
  const ini = new Date(data);
  const hoje = new Date();
  const diff = Math.floor((hoje-ini)/(1000*60*60*24));
  const dia = Math.max(1,diff+1);
  const el = document.getElementById('pac-dia');
  const prev = document.getElementById('pac-inicio-preview');
  if(el) el.value = dia;
  if(prev) prev.textContent = 'Dia atual calculado: D' + dia;
}

function calcInicioParaDia(dia){
  const hoje=new Date();
  hoje.setDate(hoje.getDate()-(dia-1));
  return hoje.toISOString().split('T')[0];
}

// ── VISÃO POR DIA ──

    <button class="btn btn-ghost btn-sm" onclick="irParaHoje()"><i class="ti ti-calendar-event"></i> Hoje</button>

function setFiltroPaciente(id){
  diasPacFiltro = id || null;
  const btn = document.getElementById('btn-limpar-pac');
  if(btn) btn.style.display = id ? 'block' : 'none';
  renderDias();
}

function _getNomePlanilhaFiltro(){
  if(!diasPacFiltro || !diasPacFiltro.startsWith('_plani_')) return null;
  return diasPacFiltro.replace('_plani_','');
}

function popularSelectPaciente(){
  const sel = document.getElementById('filtro-pac');
  if(!sel) return;
  // Todos do Firebase
  const pacsFirebase = pacientesCache.map(p=>({id:p.id, nome:p.nome, src:'firebase'}));
  // Pacientes da planilha que ainda não estão no Firebase
  const nomesFirebase = new Set(pacientesCache.map(p=>(p.nome||'').toLowerCase().trim()));
  const pacsPlani = _planilhaCache ? [...new Set(_planilhaCache.map(t=>t.paciente))]
    .filter(n=>n && !nomesFirebase.has(n.toLowerCase().trim()))
    .map(n=>({id:'_plani_'+n, nome:n+' (Planilha)', src:'planilha'})) : [];
  const todos = [...pacsFirebase, ...pacsPlani].sort((a,b)=>a.nome.localeCompare(b.nome));
  sel.innerHTML = '<option value="">Ver datas de uma paciente...</option>' +
    todos.map(p=>`<option value="${p.id}"${p.id===diasPacFiltro?' selected':''}>${p.nome}</option>`).join('');
}

function setDiasFiltro(n){
  diasFiltro=n;diasOffset=0;
  [90,120,365].forEach(x=>{
    const el=document.getElementById('btn-f'+x);if(!el)return;
    el.style.cssText=x===n?'background:var(--v);color:#fff;border:none;padding:6px 12px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:500;min-height:36px':'background:var(--g50);color:var(--g600);border:.5px solid var(--g100);padding:6px 12px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:500;min-height:36px';
  });
  renderDias();
}
function diasNav(dir){
  const _maxTot=Math.max(365,...Object.keys(tarefaMap||{}).map(Number),1);
  diasOffset=Math.max(0,Math.min(diasOffset+dir*DIAS_PAG,_maxTot-DIAS_PAG+1));
  renderDias();
}
function irParaHoje(){
  const pacs=pacientesCache.filter(p=>(parseInt(p.protocolo)||120)===diasFiltro);
  // Se tem pacientes da planilha, vai para o menor D deles
  if(_planilhaCache&&_planilhaCache.length){
    const dsPlani=_planilhaCache.map(t=>{const m=t.d.match(/D(\d+)/);return m?parseInt(m[1]):999;}).filter(d=>d<=diasFiltro);
    if(dsPlani.length){
      const menorD=Math.min(...dsPlani);
      diasOffset=Math.max(0,menorD-Math.floor(DIAS_PAG/2));
      renderDias();return;
    }
  }
  if(!pacs.length){diasOffset=0;renderDias();return;}
  const minDia=Math.min(...pacs.map(p=>diaAtualCalc(p)));
  diasOffset=Math.max(0,minDia-3);
  renderDias();
}
function renderDias(){
  const wrap=document.getElementById('dias-wrap');if(!wrap)return;
  popularSelectPaciente();
  // Junta todos os protocolos em um mapa de D → tarefa
  const tarefaMap={};
  [120,1010,1515].forEach(k=>{(PROTO[k]||[]).forEach(([d,t])=>{if(!tarefaMap[d])tarefaMap[d]=t;})});
  // Tamanho máximo de todos os protocolos
  const maxD = Math.max(365, ...Object.keys(tarefaMap).map(Number));
  const tot = maxD;
  // Todos os pacientes do Firebase (sem filtrar por protocolo)
  const pacs=pacientesCache;
  const pacPorDia={};
  pacs.forEach(p=>{const d=diaAtualCalc(p);if(!pacPorDia[d])pacPorDia[d]=[];pacPorDia[d].push({...p,diaReal:d})});

  // Adiciona pacientes da planilha nos D's correspondentes
  if(_planilhaCache){
    _planilhaCache.forEach(t=>{
      // Extrai número do D (ex: "D13 - 1 Aplicação" → 13)
      const mD = t.d.match(/D(\d+)/);
      if(!mD) return;
      const dNum = parseInt(mD[1]);
      if(dNum > tot) return; // ignora se maior que o protocolo atual
      const wa = _assocCache[t.paciente] || '';
      // Não duplica se já tem no Firebase com mesmo nome
      const jaNoFirebase = pacs.some(p => p.nome && t.paciente && 
        p.nome.toLowerCase().trim() === t.paciente.toLowerCase().trim());
      if(jaNoFirebase) return;
      if(!pacPorDia[dNum]) pacPorDia[dNum]=[];
      // Evita duplicar o mesmo paciente no mesmo dia (vindo de planilhas diferentes)
      const jaNoDia = pacPorDia[dNum].some(x => x._planilha && x.nome === t.paciente);
      if(jaNoDia) return;
      pacPorDia[dNum].push({
        id: null, nome: t.paciente, wa, diaReal: dNum,
        _planilha: true, _origem: t.origem, _tarefa: t.d
      });
    });
  }
  const ini=diasOffset,fim=Math.min(ini+DIAS_PAG-1,tot);
  const resumo=document.getElementById('dias-resumo');if(resumo)resumo.textContent=`${pacs.length} pac.`;
  const range=document.getElementById('dias-range');if(range)range.textContent=`Dia ${ini} — Dia ${fim}`;
  const prev=document.getElementById('btn-prev');if(prev)prev.disabled=ini===0;
  const next=document.getElementById('btn-next');if(next)next.disabled=fim>=tot-1;
  const cor=tot===90?'var(--v)':tot===120?'var(--b400)':'var(--a400)';
  const bg=tot===90?'var(--vl)':tot===120?'var(--b50)':'var(--a50)';
  const dias=[];for(let d=ini;d<=fim;d++)dias.push(d);
  wrap.innerHTML=`<div style="display:flex;gap:8px;min-width:max-content;padding:2px">
    ${dias.map(d=>{
      const temPac=pacPorDia[d]&&pacPorDia[d].length>0;
      const tarefaOrig=tarefaMap[d]||'';
      const tarefaExib=tarefaCustomCache[tot+'_'+d]||(tarefaOrig.replace(/^D\d+\s*/,''));
      const temTarefa=!!tarefaOrig;
      const vazio=!temPac&&!temTarefa;
      return`<div style="flex-shrink:0;width:${temPac||temTarefa?'185px':'50px'};min-height:${temPac||temTarefa?'200px':'60px'};background:${vazio?'var(--g50)':'#fff'};border:.5px solid ${temPac?cor:'var(--g100)'};border-radius:10px;overflow:hidden;${vazio?'opacity:.3':''}"
        data-dia="${d}" data-tot="${tot}"
        ondragover="event.preventDefault();this.style.outline='2px dashed '+('${cor}')" 
        ondragleave="this.style.outline=''"
        ondrop="dropDia(event,${d},${tot})">
        <div style="padding:6px 10px;background:${temPac?cor:temTarefa?bg:'var(--g50)'};border-bottom:.5px solid ${temPac?cor+'44':'var(--g100)'}">
          <div style="font-size:12px;font-weight:700;color:${temPac?'#fff':temTarefa?cor:'var(--g400)'}">D${d}</div>
          ${(()=>{if(diasPacFiltro){
            const nomePlani=_getNomePlanilhaFiltro();
            const ref=nomePlani?null:pacientesCache.find(p=>p.id===diasPacFiltro);
            if(ref&&ref.inicio){const ini2=new Date(ref.inicio+'T12:00:00');ini2.setDate(ini2.getDate()+d);return'<div style="font-size:9px;color:'+(temPac?'rgba(255,255,255,.6)':cor+'99')+';font-weight:500">'+ini2.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+'</div>';}
          }return '';})()}
          ${temTarefa?`<div contenteditable="true" id="tarefa-${tot}-${d}"
            style="font-size:10px;color:${temPac?'rgba(255,255,255,.85)':cor};margin-top:2px;line-height:1.3;outline:none;cursor:text;max-width:165px"
            onblur="salvarTarefaCustom(${tot},${d},this.innerText)"
            title="Clique para editar">${tarefaExib}</div>`:''}
        </div>
        ${temPac||temTarefa?`<div style="padding:8px">
          ${temPac?pacPorDia[d].map(p=>p._planilha?`
            <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:.5px solid var(--g50);">
              <div style="width:24px;height:24px;border-radius:50%;background:var(--g100);color:var(--g500);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${(p.nome||'?').charAt(0)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--g700)">${p.nome.split(' ')[0]}</div>
                <div style="font-size:9px;color:var(--g400)">📋 Planilha</div>
              </div>
              ${p.wa?`<button class="btn-wa" style="padding:2px 6px;font-size:10px;min-height:24px;flex-shrink:0" onclick="openWA('${p.wa}')"><i class="ti ti-brand-whatsapp"></i></button>`:`<button onclick="associarNoDia('${p.nome}')" title="Associar contato WhatsApp" style="padding:2px 6px;background:var(--v);border:none;border-radius:5px;font-size:9px;cursor:pointer;color:#fff;flex-shrink:0;white-space:nowrap"><i class="ti ti-link"></i> Vincular</button>`}
            </div>`:`
            <div draggable="true" ondragstart="dragStartDia(event,'${p.id}',${d},${tot})" 
              style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:.5px solid var(--g50);cursor:grab">
              <div style="width:24px;height:24px;border-radius:50%;background:${bg};color:${cor};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${(p.nome||'?').charAt(0)}</div>
              <div style="flex:1;min-width:0;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="abrirPaciente('${p.id}')">${p.nome.split(' ')[0]}</div>
              ${p.wa?`<button class="btn-wa" style="padding:2px 6px;font-size:10px;min-height:24px;flex-shrink:0" onclick="openWA('${p.wa}')"><i class="ti ti-brand-whatsapp"></i></button>`:''}            </div>`).join(''):''}
          ${temTarefa?`<div style="margin-top:6px">
            <div style="font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;margin-bottom:4px">Mensagem</div>
            <textarea id="msg-${tot}-${d}" rows="3" placeholder="Mensagem do dia ${d}..."
              style="width:100%;border:.5px solid var(--g100);border-radius:6px;padding:5px 7px;font-size:11px;font-family:Inter,sans-serif;resize:vertical;outline:none"
              onfocus="this.style.borderColor='${cor}'"
              onblur="this.style.borderColor='var(--g100)';salvarMsgDia(${tot},${d},this.value)">${getMsgDia(tot,d)}</textarea>
          </div>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
  // Touch drag dias
  initTouchDias();
}

// Drag dias
let _dragDiaPacId=null,_dragDiaDia=null,_dragDiaTot=null;
function dragStartDia(e,pacId,dia,tot){
  _dragDiaPacId=pacId;_dragDiaDia=dia;_dragDiaTot=tot;
  e.dataTransfer.effectAllowed='move';
}
async function dropDia(e,novoDia,tot){
  e.preventDefault();
  e.currentTarget.style.outline='';
  if(!_dragDiaPacId)return;
  const p=pacientesCache.find(x=>x.id===_dragDiaPacId);if(!p)return;
  await fbUp('pacientes',_dragDiaPacId,{diaAtual:novoDia,inicio:calcNovaData(novoDia)});
  toast(`→ Dia ${novoDia}`);
  _dragDiaPacId=null;
}
function calcNovaData(dia){
  const hoje=new Date();
  hoje.setDate(hoje.getDate()-(dia-1));
  return hoje.toISOString().split('T')[0];
}

// Touch dias
let _tdPacId=null,_tdClone=null;
function initTouchDias(){
  const pacs=document.querySelectorAll('[draggable=true][ondragstart*="dragStartDia"]');
  pacs.forEach(el=>{
    el.addEventListener('touchstart',e=>{
      const m=el.getAttribute('ondragstart').match(/'([^']+)',(\d+),(\d+)/);
      if(!m)return;
      _tdPacId=m[1];
      _tdClone=el.cloneNode(true);
      _tdClone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;z-index:9999;width:160px;background:#fff;border-radius:8px;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,.2)`;
      document.body.appendChild(_tdClone);
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      if(!_tdClone)return;
      const t=e.touches[0];
      _tdClone.style.left=(t.clientX-80)+'px';_tdClone.style.top=(t.clientY-20)+'px';
    },{passive:true});
    el.addEventListener('touchend',async e=>{
      if(!_tdClone){return;}
      const t=e.changedTouches[0];
      const target=document.elementFromPoint(t.clientX,t.clientY);
      const diaEl=target?.closest('[data-dia]');
      if(diaEl&&_tdPacId){
        const novoDia=parseInt(diaEl.dataset.dia);
        await fbUp('pacientes',_tdPacId,{diaAtual:novoDia,inicio:calcNovaData(novoDia)});
        toast(`→ Dia ${novoDia}`);
      }
      _tdClone.remove();_tdClone=null;_tdPacId=null;
    });
  });
}

// Msgs dias
function getMsgDia(proto,dia){return msgDiaCache[proto+'_'+dia]||''}
function getTarefaCustom(proto,dia){return tarefaCustomCache[proto+'_'+dia]||''}
async function salvarMsgDia(proto,dia,valor){
  msgDiaCache[proto+'_'+dia]=valor;
  try{await db.collection('msgs_dia').doc(proto+'_'+dia).set({protocolo:proto,dia,mensagem:valor,atualizado:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
}
async function salvarTarefaCustom(proto,dia,valor){
  tarefaCustomCache[proto+'_'+dia]=valor.trim();
  try{await db.collection('tarefas_custom').doc(proto+'_'+dia).set({protocolo:proto,dia,texto:valor.trim(),atualizado:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
}
async function carregarMsgsDia(){
  try{
    const[msgs,tarefas]=await Promise.all([db.collection('msgs_dia').get(),db.collection('tarefas_custom').get()]);
    msgs.docs.forEach(d=>{const x=d.data();msgDiaCache[x.protocolo+'_'+x.dia]=x.mensagem||''});
    tarefas.docs.forEach(d=>{const x=d.data();tarefaCustomCache[x.protocolo+'_'+x.dia]=x.texto||''});
  }catch(e){}
}

function openM(id){document.getElementById(id).classList.add('open')}
function closeM(id){document.getElementById(id).classList.remove('open')}

document.addEventListener('DOMContentLoaded',()=>initTouchKanban());
async function limparDuplicatas(aba){
  if(!confirm('Remover leads duplicados automaticamente? Mantém o mais antigo de cada número.'))return;
  const col=aba==='atendente'?'leads':'vendas';
  const dados=aba==='atendente'?leadsCache:vendasCache;
  const waMap={};
  const paraRemover=[];
  // Ordena por data de criação (mais antigo primeiro) - os sem data ficam por último
  const ordenados=[...dados].sort((a,b)=>{
    const ta=a.criadoEm?.seconds||0;
    const tb=b.criadoEm?.seconds||0;
    return ta-tb;
  });
  ordenados.forEach(d=>{
    const w=limparNumero(d.wa);
    if(w){if(waMap[w])paraRemover.push(d.id);else waMap[w]=d.id;}
  });
  if(!paraRemover.length){toast('Nenhum duplicado encontrado!');return;}
  for(const id of paraRemover)await fbDel(col,id);
  toast(`✅ ${paraRemover.length} duplicado(s) removido(s)!`);
}
