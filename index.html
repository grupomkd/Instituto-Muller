<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Müller — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#1a5c3a;--vm:#1d6b44;--vl:#e8f4ed;--vxl:#c8e6d4;--vb:#0f3d26;
  --g50:#F1EFE8;--g100:#D3D1C7;--g200:#B4B2A9;--g400:#888780;--g600:#5F5E5A;--g800:#444441;--g900:#2C2C2A;
  --b50:#E6F1FB;--b400:#378ADD;--b600:#185FA5;
  --a50:#FAEEDA;--a400:#BA7517;--a600:#854F0B;
  --c50:#FAECE7;--c400:#D85A30;--c600:#993C1D;
  --r50:#FCEBEB;--r400:#E24B4A;
  --p50:#EEEDFE;--p400:#7F77DD;--p600:#534AB7;
}
body{font-family:'Inter',sans-serif;font-size:14px;background:#f0f4f1;color:var(--g900);min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;background:linear-gradient(135deg,var(--vb) 0%,var(--v) 100%)}
.login-logo h1{font-size:26px;font-weight:600;color:#fff;text-align:center}
.login-logo p{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;letter-spacing:.5px;text-transform:uppercase;text-align:center}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:28px 32px;width:190px;cursor:pointer;transition:all .2s;text-align:center;color:#fff}
.login-card:hover{background:rgba(255,255,255,.2);transform:translateY(-3px)}
.login-card .ci{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;background:rgba(255,255,255,.15)}
.login-card h3{font-size:14px;font-weight:600}
.login-card p{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px}

/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--v);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:10px}
.topbar-logo i{font-size:20px;color:rgba(255,255,255,.7)}
.role-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;background:rgba(255,255,255,.2);color:#fff}
.btn-logout{font-size:12px;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-logout:hover{color:#fff}
.main{display:flex;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:#fff;border-right:.5px solid var(--g100);padding:16px 10px;display:flex;flex-direction:column;gap:3px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--g600);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .1s}
.nav-item:hover{background:var(--g50);color:var(--g900)}
.nav-item.active{background:var(--vl);color:var(--v);font-weight:500}
.nav-item i{font-size:17px}
.nav-badge{margin-left:auto;background:var(--c400);color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}

/* CONTENT */
.content{flex:1;padding:24px;overflow-y:auto;min-width:0}
.ph{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ph h2{font-size:18px;font-weight:600}
.ph p{font-size:13px;color:var(--g400);margin-top:2px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.sc{background:#fff;border:.5px solid var(--g100);border-radius:10px;padding:14px 16px}
.sc .lb{font-size:11px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sc .vl{font-size:24px;font-weight:600;color:var(--g900);margin-top:4px}

/* KANBAN */
.kw{overflow-x:auto;padding-bottom:12px}
.kb{display:flex;gap:12px;min-width:max-content}
.kc{width:230px;background:#fff;border:.5px solid var(--g100);border-radius:12px;overflow:hidden;flex-shrink:0}
.kch{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--g100)}
.kct{font-size:12px;font-weight:600;color:var(--g800);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kcc{font-size:11px;font-weight:600;background:var(--g50);color:var(--g400);padding:2px 8px;border-radius:10px}
.btn-ec{background:none;border:none;cursor:pointer;color:var(--g400);font-size:14px;padding:2px 4px;border-radius:4px}
.btn-ec:hover{color:var(--v);background:var(--vl)}
.kcards{padding:10px;min-height:80px;display:flex;flex-direction:column;gap:8px}
.kcard{background:#fff;border:.5px solid var(--g100);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
.kcard:hover{border-color:var(--vxl)}
.kcard .kn{font-size:13px;font-weight:500;color:var(--g900)}
.kcard .ks{font-size:11px;color:var(--g400);margin-top:3px}
.kcard .ka{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.kadd-col{width:160px;flex-shrink:0;border:1.5px dashed var(--g100);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--g400);font-size:13px;min-height:100px;transition:all .15s}
.kadd-col:hover{border-color:var(--v);color:var(--v);background:var(--vl)}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.bv{background:var(--vl);color:var(--v)}
.bb{background:var(--b50);color:var(--b600)}
.ba{background:var(--a50);color:var(--a600)}
.bc{background:var(--c50);color:var(--c600)}
.br{background:var(--r50);color:var(--r400)}
.bp{background:var(--p50);color:var(--p600)}
.bg{background:var(--g50);color:var(--g600)}

/* BTN */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-v{background:var(--v);color:#fff}
.btn-b{background:var(--b400);color:#fff}
.btn-a{background:var(--a400);color:#fff}
.btn-p{background:var(--p400);color:#fff}
.btn-r{background:var(--r400);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-ghost{background:var(--g50);color:var(--g800);border:.5px solid var(--g100)}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-cancel{padding:8px 16px;border-radius:8px;font-size:13px;border:.5px solid var(--g100);background:none;cursor:pointer;color:var(--g600)}
.btn-danger{background:var(--r50);color:var(--r400);border:.5px solid #f7c1c1}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(15,61,38,.5);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.modal{background:#fff;border-radius:16px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:28px}
.modal-lg{width:700px}
.modal-sm{width:360px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mh h3{font-size:16px;font-weight:600}
.mc{background:none;border:none;cursor:pointer;font-size:20px;color:var(--g400)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;border:.5px solid var(--g100);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--g900);background:#fff;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--v)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{margin-top:20px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.ms{margin-top:16px;padding-top:16px;border-top:.5px solid var(--g100)}
.ms-title{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}

/* CONTATOS */
.cont-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:.5px solid var(--g50);cursor:pointer;transition:background .1s}
.cont-item:hover{background:var(--vl)}
.cont-item.sel{background:var(--vl);border-left:3px solid var(--v)}
.av{width:38px;height:38px;border-radius:50%;background:var(--vl);color:var(--v);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.ci-info .cn{font-size:13px;font-weight:500;color:var(--g900)}
.ci-info .cw{font-size:11px;color:var(--g400)}
.ci-info .ct{margin-top:3px;display:flex;gap:4px;flex-wrap:wrap}
.cont-list{max-height:320px;overflow-y:auto;border:.5px solid var(--g100);border-radius:8px}

/* TABLE */
.tc{background:#fff;border:.5px solid var(--g100);border-radius:12px;overflow:hidden}
.tt{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--g100)}
.tt input{flex:1;border:.5px solid var(--g100);border-radius:8px;padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:var(--g50);color:var(--g900)}
.tt input:focus{border-color:var(--v)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--g50);font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;padding:10px 16px;text-align:left}
tbody td{padding:11px 16px;font-size:13px;border-top:.5px solid var(--g50);color:var(--g800);vertical-align:middle}
tbody tr:hover{background:var(--g50)}

/* PROTOCOLO */
.ph-pac{background:var(--v);border-radius:12px;padding:18px 22px;margin-bottom:20px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.ph-pac .pn{font-size:17px;font-weight:600}
.ph-pac .pm{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
.ph-pac .pd{font-size:32px;font-weight:700}
.ph-pac .pdl{font-size:12px;color:rgba(255,255,255,.7)}

/* DIAS */
.dias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.dc{background:#fff;border:.5px solid var(--g100);border-radius:10px;overflow:hidden}
.dc.tem{border-color:var(--vxl)}
.dch{padding:8px 12px;background:var(--g50);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--g600)}
.dcb{padding:8px 12px}
.dpac{font-size:12px;color:var(--g800);padding:4px 0;border-bottom:.5px solid var(--g50);display:flex;align-items:center;gap:6px}
.dpac:last-child{border-bottom:none}
.dmsg{font-size:11px;color:var(--g400);margin-top:6px;font-style:italic;line-height:1.4}

/* PB */
.pb{background:var(--g100);border-radius:4px;height:6px;overflow:hidden;display:block;width:100%}
.pf{height:100%;border-radius:4px;background:var(--v)}

/* DRAG AND DROP */
.kcard.dragging{opacity:.4;transform:scale(.97);cursor:grabbing}
.kcard{cursor:grab}
.kards.drag-over{background:var(--vl);border-radius:8px;outline:2px dashed var(--v)}
.kards.drag-over *{pointer-events:none}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--v);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}

.loading{text-align:center;padding:40px;color:var(--g400);font-size:13px}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 24px;color:var(--g400)}
.empty i{font-size:32px;display:block;margin-bottom:8px}

/* FLUXO EDITOR */
.fe-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--g50);border-radius:8px;margin-bottom:6px}
.fe-item input{flex:1;border:.5px solid var(--g100);border-radius:6px;padding:5px 8px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none}
.fe-item input:focus{border-color:var(--v)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">
    <h1>Instituto Müller</h1>
    <p>Sistema de atendimento interno</p>
  </div>
  <div class="login-cards">
    <div class="login-card" onclick="login('atendente')">
      <div class="ci"><i class="ti ti-headset"></i></div>
      <h3>Atendente</h3><p>Qualificação e agendamentos</p>
    </div>
    <div class="login-card" onclick="login('vendas')">
      <div class="ci"><i class="ti ti-target"></i></div>
      <h3>Vendas</h3><p>Fechamento de propostas</p>
    </div>
    <div class="login-card" onclick="login('concierge')">
      <div class="ci"><i class="ti ti-clipboard-heart"></i></div>
      <h3>Concierge</h3><p>Acompanhamento do protocolo</p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <i class="ti ti-leaf" aria-hidden="true"></i>
      Instituto Müller
      <span class="role-tag" id="role-badge"></span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="ti ti-logout"></i> Sair</button>
  </div>
  <div class="main">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL LEAD/CONTATO -->
<div class="mo" id="m-lead">
  <div class="modal">
    <div class="mh"><h3 id="ml-title">Novo lead</h3><button class="mc" onclick="closeM('m-lead')"><i class="ti ti-x"></i></button></div>
    <div class="fg"><label>Buscar nos contatos</label>
      <input type="text" id="ml-busca" placeholder="Nome ou número..." oninput="filtrarContatosM(this.value)">
    </div>
    <div class="cont-list" id="ml-cont-list" style="margin-bottom:12px">
      <div class="loading"><i class="ti ti-loader spin"></i> Carregando...</div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--g400);margin-bottom:12px">— ou preencha manualmente —</div>
    <div class="fr">
      <div class="fg"><label>Nome</label><input id="ml-nome" placeholder="Nome completo"></div>
      <div class="fg"><label>WhatsApp</label><input id="ml-wa" placeholder="51 9 9999-9999"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Origem</label>
        <select id="ml-origem"><option>Instagram</option><option>Indicação</option><option>Google</option><option>WhatsApp direto</option><option>Outro</option></select>
      </div>
      <div class="fg"><label>Objetivo</label><input id="ml-obj" placeholder="Emagrecimento..."></div>
    </div>
    <div class="fg"><label>Etapa</label><select id="ml-etapa"></select></div>
    <div class="mf">
      <button class="btn-cancel" onclick="closeM('m-lead')">Cancelar</button>
      <button class="btn btn-v" onclick="salvarLead()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL VER -->
<div class="mo" id="m-ver">
  <div class="modal">
    <div class="mh"><h3 id="mv-title">Detalhes</h3><button class="mc" onclick="closeM('m-ver')"><i class="ti ti-x"></i></button></div>
    <div id="mv-body"></div>
    <div class="mf" id="mv-footer"><button class="btn-cancel" onclick="closeM('m-ver')">Fechar</button></div>
  </div>
</div>

<!-- MODAL EDITAR COL -->
<div class="mo" id="m-col">
  <div class="modal modal-sm">
    <div class="mh"><h3>Editar etapa</h3><button class="mc" onclick="closeM('m-col')"><i class="ti ti-x"></i></button></div>
    <div class="fg"><label>Nome</label><input id="col-nome" placeholder="Ex: Aguardando retorno"></div>
    <div class="fg"><label>Cor</label>
      <select id="col-cor">
        <option value="#1D9E75">Verde</option><option value="#378ADD">Azul</option>
        <option value="#BA7517">Âmbar</option><option value="#D85A30">Coral</option>
        <option value="#E24B4A">Vermelho</option><option value="#7F77DD">Roxo</option>
        <option value="#888780">Cinza</option>
      </select>
    </div>
    <div class="mf">
      <button class="btn btn-danger btn-sm" onclick="deletarCol()"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeM('m-col')">Cancelar</button>
      <button class="btn btn-v" onclick="salvarCol()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PROTOCOLO -->
<div class="mo" id="m-pac">
  <div class="modal modal-lg">
    <div class="mh"><h3 id="mpac-title">Protocolo</h3><button class="mc" onclick="closeM('m-pac')"><i class="ti ti-x"></i></button></div>
    <div id="mpac-body"></div>
    <div class="mf">
      <button class="btn-cancel" onclick="closeM('m-pac')">Fechar</button>
      <button class="btn btn-v" onclick="salvarProtocolo()"><i class="ti ti-device-floppy"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL FLUXO EDITOR -->
<div class="mo" id="m-fluxo">
  <div class="modal">
    <div class="mh"><h3 id="mf-title">Editar fluxo</h3><button class="mc" onclick="closeM('m-fluxo')"><i class="ti ti-x"></i></button></div>
    <div id="mf-body"></div>
    <div class="mf">
      <button class="btn-cancel" onclick="closeM('m-fluxo')">Cancelar</button>
      <button class="btn btn-v" onclick="salvarFluxo()"><i class="ti ti-device-floppy"></i> Salvar fluxo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── FB HELPERS ──
async function fbAdd(col,data){return await window.db.collection(col).add({...data,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})}
async function fbUp(col,id,data){await window.db.collection(col).doc(id).update(data)}
async function fbDel(col,id){await window.db.collection(col).doc(id).delete()}
function fbListen(col,cb){
  return window.db.collection(col).orderBy('criadoEm','desc')
    .onSnapshot(snap=>cb(snap.docs.map(d=>({id:d.id,...d.data()}))));
}
async function fbGetCols(aba){
  const snap=await window.db.collection('cfg_cols_'+aba).get();
  if(snap.empty)return null;
  return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
}
async function fbSaveCols(aba,cols){
  const ref=window.db.collection('cfg_cols_'+aba);
  const snap=await ref.get();
  for(const d of snap.docs)await d.ref.delete();
  for(let i=0;i<cols.length;i++)await ref.add({nome:cols[i].nome,cor:cols[i].cor,ordem:i});
}

function tarefaDoDia(protocolo, dia) {
  const lista = PROTO[protocolo] || PROTO[120];
  let ultima = lista[0];
  for (const [d, tarefa] of lista) {
    if (d <= dia) ultima = [d, tarefa];
    else break;
  }
  const proxima = lista.find(([d]) => d > dia);
  return { atual: ultima[1], proxDia: proxima ? proxima[0] : null };
}

function diaAtualCalculado(p) {
  if (!p.inicio) return p.diaAtual || 1;
  const inicio = new Date(p.inicio);
  const hoje = new Date();
  const diff = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));
  return Math.max(1, Math.min(diff + 1, p.protocolo || 120));
}

    <span style="font-size:12px;color:var(--g400);font-weight:500">Protocolo:</span>
    <button class="btn btn-sm" id="btn-f90" onclick="setDiasFiltro(90)">90 dias</button>
    <button class="btn btn-sm" id="btn-f120" onclick="setDiasFiltro(120)">120 dias</button>
    <button class="btn btn-sm" id="btn-f365" onclick="setDiasFiltro(365)">365 dias</button>
    <span id="dias-resumo" style="margin-left:auto;font-size:12px;color:var(--g400)"></span>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
    <button class="btn btn-ghost btn-sm" id="btn-prev" onclick="diasNav(-1)"><i class="ti ti-chevron-left"></i> Anterior</button>
    <span id="dias-range" style="font-size:13px;color:var(--g600)"></span>
    <button class="btn btn-ghost btn-sm" id="btn-next" onclick="diasNav(1)">Próximo <i class="ti ti-chevron-right"></i></button>
    <button class="btn btn-ghost btn-sm" onclick="irParaHoje()" style="margin-left:8px"><i class="ti ti-calendar-event"></i> Hoje</button>
  </div>
  <div id="dias-grid-wrap" style="overflow-x:auto;padding-bottom:16px">
    <div class="loading"><i class="ti ti-loader spin"></i></div>
  </div>`;
}

function setDiasFiltro(n){
  diasProtocoFiltro=n; diasOffset=0;
  [90,120,365].forEach(x=>{
    const el=document.getElementById('btn-f'+x);if(!el)return;
    if(x===n){el.style.cssText='background:var(--v);color:#fff;border:.5px solid var(--vm);padding:5px 10px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:500'}
    else{el.style.cssText='background:var(--g50);color:var(--g600);border:.5px solid var(--g100);padding:5px 10px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:500'}
  });
  renderDias();
}

function diasNav(dir){
  const tot=diasProtocoFiltro;
  diasOffset=Math.max(0,Math.min(diasOffset+dir*DIAS_POR_PAGINA, tot-DIAS_POR_PAGINA+1));
  renderDias();
}

function irParaHoje(){
  // Encontra o menor dia atual dos pacientes deste protocolo
  const pacs=pacientesCache.filter(p=>(parseInt(p.protocolo)||120)===diasProtocoFiltro);
  if(!pacs.length){diasOffset=0;renderDias();return;}
  const minDia=Math.min(...pacs.map(p=>diaAtualCalculado(p)));
  diasOffset=Math.max(0,minDia-3);
  renderDias();
}

function renderDias(){
  const wrap=document.getElementById('dias-grid-wrap');if(!wrap)return;
  const tot=diasProtocoFiltro;
  const proto=PROTO[tot]||PROTO[120];
  const tarefaMap={};
  proto.forEach(([d,t])=>tarefaMap[d]=t);

  const pacs=pacientesCache.filter(p=>(parseInt(p.protocolo)||120)===tot);
  const pacPorDia={};
  pacs.forEach(p=>{
    const d=diaAtualCalculado(p);
    if(!pacPorDia[d])pacPorDia[d]=[];
    pacPorDia[d].push({...p,diaReal:d});
  });

  const resumo=document.getElementById('dias-resumo');
  if(resumo)resumo.textContent=`${pacs.length} paciente${pacs.length!==1?'s':''} · ${tot} dias`;

  const ini=diasOffset;
  const fim=Math.min(ini+DIAS_POR_PAGINA-1,tot);
  const range=document.getElementById('dias-range');
  if(range)range.textContent=`Dia ${ini} — Dia ${fim} de ${tot}`;

  const prev=document.getElementById('btn-prev');
  const next=document.getElementById('btn-next');
  if(prev)prev.disabled=ini===0;
  if(next)next.disabled=fim>=tot;

  const cor=tot===90?'var(--v)':tot===120?'var(--b400)':'var(--a400)';
  const bg=tot===90?'var(--vl)':tot===120?'var(--b50)':'var(--a50)';

  const dias=[];
  for(let d=ini;d<=fim;d++)dias.push(d);

  wrap.innerHTML=`<div style="display:flex;gap:8px;min-width:max-content;padding:4px 2px">
    ${dias.map(d=>{
      const temPac=pacPorDia[d]&&pacPorDia[d].length>0;
      const tarefaOriginal=tarefaMap[d]||'';
      const tarefaCustom=getTarefaCustom(tot,d);
      const tarefaExibida=tarefaCustom||(tarefaOriginal.replace(/^D\d+\s*/,''));
      const temTarefa=!!tarefaOriginal;
      const vazio=!temPac&&!temTarefa;
      return`<div style="flex-shrink:0;width:${temPac||temTarefa?'200px':'52px'};min-height:${temPac||temTarefa?'200px':'70px'};background:${vazio?'var(--g50)':'#fff'};border:.5px solid ${temPac?cor:'var(--g100)'};border-radius:10px;overflow:hidden;${vazio?'opacity:.35':''}">
        <div style="padding:8px 10px;background:${temPac?cor:temTarefa?bg:'var(--g50)'};border-bottom:.5px solid ${temPac?cor+'55':'var(--g100)'};position:relative">
          <div style="font-size:13px;font-weight:700;color:${temPac?'#fff':temTarefa?cor:'var(--g400)'}">D${d}</div>
          ${temTarefa?`<div
            contenteditable="true"
            id="tarefa-${tot}-${d}"
            style="font-size:10px;color:${temPac?'rgba(255,255,255,.85)':cor};margin-top:2px;line-height:1.3;outline:none;cursor:text;min-height:14px;max-width:180px"
            onblur="salvarTarefaCustom(${tot},${d},this.innerText)"
            title="Clique para editar"
          >${tarefaExibida}</div>`:''}
        </div>
        ${temPac||temTarefa?`<div style="padding:8px 10px">
          ${temPac?pacPorDia[d].map(p=>`
            <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:.5px solid var(--g50);cursor:pointer" onclick="abrirPaciente('${p.id}')">
              <div style="width:24px;height:24px;border-radius:50%;background:${bg};color:${cor};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${(p.nome||'?').charAt(0)}</div>
              <div style="flex:1;min-width:0;font-size:11px;font-weight:500;color:var(--g900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nome.split(' ')[0]}</div>
              ${p.wa?`<button class="btn-wa" style="padding:2px 6px;font-size:10px;flex-shrink:0" onclick="event.stopPropagation();openWA('${p.wa}')"><i class="ti ti-brand-whatsapp"></i></button>`:''}
            </div>`).join(''):''}
          ${temTarefa?`<div style="margin-top:${temPac?'8px':'0'}">
            <div style="font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Mensagem</div>
            <textarea id="msg-${tot}-${d}" rows="3"
              placeholder="Mensagem do dia ${d}..."
              style="width:100%;border:.5px solid var(--g100);border-radius:6px;padding:5px 7px;font-size:11px;font-family:Inter,sans-serif;resize:vertical;outline:none;color:var(--g800);background:#fff;box-sizing:border-box"
              onfocus="this.style.borderColor='${cor}'"
              onblur="this.style.borderColor='var(--g100)';salvarMsgDia(${tot},${d},this.value)"
            >${getMsgDia(tot,d)}</textarea>
          </div>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

// Cache de mensagens e tarefas customizadas
const msgDiaCache={};
const tarefaCustomCache={};

function getMsgDia(proto,dia){return msgDiaCache[proto+'_'+dia]||''}
function getTarefaCustom(proto,dia){return tarefaCustomCache[proto+'_'+dia]||''}

async function salvarMsgDia(proto,dia,valor){
  msgDiaCache[proto+'_'+dia]=valor;
  try{await window.db.collection('msgs_dia').doc(proto+'_'+dia).set({protocolo:proto,dia,mensagem:valor,atualizado:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
}

async function salvarTarefaCustom(proto,dia,valor){
  tarefaCustomCache[proto+'_'+dia]=valor.trim();
  try{await window.db.collection('tarefas_custom').doc(proto+'_'+dia).set({protocolo:proto,dia,texto:valor.trim(),atualizado:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
}

async function carregarMsgsDia(){
  try{
    const [msgs,tarefas]=await Promise.all([
      window.db.collection('msgs_dia').get(),
      window.db.collection('tarefas_custom').get()
    ]);
    msgs.docs.forEach(d=>{const x=d.data();msgDiaCache[x.protocolo+'_'+x.dia]=x.mensagem||''});
    tarefas.docs.forEach(d=>{const x=d.data();tarefaCustomCache[x.protocolo+'_'+x.dia]=x.texto||''});
  }catch(e){}
}


// ── DRAG AND DROP ──
let _dragId=null, _dragAba=null;

function dragStart(e,id,aba){
  _dragId=id; _dragAba=aba;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kards').forEach(el=>el.classList.remove('drag-over'));
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
async function dropCard(e,novaEtapa,aba){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragId||!_dragAba)return;
  if(_dragAba!==aba)return;
  await moverEtapa(_dragId,aba,novaEtapa);
  _dragId=null; _dragAba=null;
}

// Touch drag support (mobile)
let _touchCard=null,_touchClone=null,_touchAba=null,_touchId=null;
function initTouchDrag(){
  document.addEventListener('touchstart',e=>{
    const card=e.target.closest('.kcard');
    if(!card)return;
    _touchCard=card;
    _touchId=card.dataset.id;
    _touchAba=card.dataset.aba;
    _touchClone=card.cloneNode(true);
    _touchClone.style.cssText='position:fixed;opacity:.7;pointer-events:none;z-index:9999;width:'+card.offsetWidth+'px;transform:scale(1.05)';
    document.body.appendChild(_touchClone);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!_touchClone)return;
    const t=e.touches[0];
    _touchClone.style.left=(t.clientX-80)+'px';
    _touchClone.style.top=(t.clientY-30)+'px';
    document.querySelectorAll('.kards').forEach(el=>el.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const kards=el?.closest('.kards');
    if(kards)kards.classList.add('drag-over');
  },{passive:true});
  document.addEventListener('touchend',async e=>{
    if(!_touchClone)return;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const kards=el?.closest('.kards');
    document.querySelectorAll('.kards').forEach(el=>el.classList.remove('drag-over'));
    if(kards&&_touchId&&_touchAba){
      const novaEtapa=kards.dataset.etapa;
      if(novaEtapa)await moverEtapa(_touchId,_touchAba,novaEtapa);
    }
    _touchClone.remove();
    _touchClone=null;_touchCard=null;_touchId=null;_touchAba=null;
  });
}

function openM(id){document.getElementById(id).classList.add('open')}
function closeM(id){document.getElementById(id).classList.remove('open')}
function openWA(n){if(!n)return;const clean=(n||'').replace(/@.*$/,'').replace(/\D/g,'');if(!clean||clean.length<8)return;window.open('https://wa.me/'+(clean.startsWith('55')?clean:'55'+clean),'_blank')}
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')}));
window.addEventListener('firebase-ready',()=>{console.log('✅ Instituto Müller Firebase OK');initTouchDrag();});
